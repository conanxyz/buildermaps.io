name: Update Data from CSV Attachment

permissions:
  contents: write
  issues: write

on:
  issues:
    types: [labeled]

jobs:
  update-data-from-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Check if label is update-from-csv
        id: check_label
        run: |
          LABEL_NAME="${{ github.event.label.name }}"
          echo "Label added: $LABEL_NAME"
          if [ "$LABEL_NAME" = "update-from-csv" ]; then
            echo "valid_label=true" >> "$GITHUB_OUTPUT"
            echo "✅ Valid label detected: $LABEL_NAME"
          else
            echo "valid_label=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Skipping: Label '$LABEL_NAME' is not update-from-csv"
            exit 0
          fi

      - name: Check out code
        if: steps.check_label.outputs.valid_label == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Extract CSV attachment URL from issue body
        if: steps.check_label.outputs.valid_label == 'true'
        id: csv
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python - <<'PY'
          import os, re, sys
          body = os.environ.get("ISSUE_BODY", "") or ""
          # Match markdown links or bare URLs that end with .csv (common for issue attachments)
          patterns = [
              r"\((https?://[^)\s]+\.csv(?:\?[^)\s]+)?)\)",
              r"(https?://\S+\.csv(?:\?\S+)?)",
          ]
          url = None
          for p in patterns:
              m = re.search(p, body, flags=re.IGNORECASE)
              if m:
                  url = m.group(1)
                  break
          if not url:
              print("No .csv attachment URL found in issue body.", file=sys.stderr)
              sys.exit(1)
          print(f"Found CSV URL: {url}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"csv_url={url}\n")
          PY

      - name: Download CSV attachment
        if: steps.check_label.outputs.valid_label == 'true'
        env:
          CSV_URL: ${{ steps.csv.outputs.csv_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .tmp
          curl -L \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/octet-stream" \
            "$CSV_URL" \
            -o .tmp/input.csv
          test -s .tmp/input.csv

      - name: Set up Python
        if: steps.check_label.outputs.valid_label == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # No pip dependencies are installed in this workflow (stdlib-only script),
          # so avoid enabling pip cache to prevent post-job cache errors.

      - name: Apply CSV into public/data (merge, no deletions)
        if: steps.check_label.outputs.valid_label == 'true'
        run: |
          python process-builder-data/apply_to_buildermaps.py .tmp/input.csv --repo-root .

      - name: Setup Node.js
        if: steps.check_label.outputs.valid_label == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20.9.0"
          cache: "npm"

      - name: Install Node dependencies
        if: steps.check_label.outputs.valid_label == 'true'
        run: npm install --legacy-peer-deps

      - name: Check for duplicate project IDs
        if: steps.check_label.outputs.valid_label == 'true'
        run: node scripts/check-duplicate-ids.js

      - name: Verify data integrity
        if: steps.check_label.outputs.valid_label == 'true'
        run: npm run verify:maps

      - name: Build builder-maps.json
        if: steps.check_label.outputs.valid_label == 'true'
        run: npm run build:maps

      - name: Commit changes to a branch
        if: steps.check_label.outputs.valid_label == 'true'
        id: commit
        env:
          BRANCH_NAME: "chore/update-from-csv-issue-${{ github.event.issue.number }}-${{ github.run_id }}"
        run: |
          set -e
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git checkout -b "$BRANCH_NAME"
          git add public/data/

          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore(data): update from csv issue #${{ github.event.issue.number }}"
          git push --set-upstream origin "$BRANCH_NAME"

          echo "no_changes=false" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Comment on issue with PR link
        if: steps.check_label.outputs.valid_label == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = `${{ steps.commit.outputs.branch_name }}`.trim()
            const noChanges = `${{ steps.commit.outputs.no_changes }}`.trim() === 'true'

            if (noChanges) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `✅ No data changes detected from the attached CSV. (Branch: \`${branchName}\`)`
              })
              return
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ CSV updates pushed to branch: \`${branchName}\`. You can open a PR from this branch when ready.`
            })

