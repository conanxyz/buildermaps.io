name: Claude GitHub Models Agent

permissions:
  contents: write
  pull-requests: write
  issues: write

on:
  issues:
    types: [opened, labeled]

jobs:
  claude-agent:
    runs-on: ubuntu-latest

    steps:

      - name: Check bug label
        id: check
        run: |
          LABELS='${{ toJson(github.event.issue.labels) }}'
          if echo "$LABELS" | grep -q "bug-fixing"; then
            echo "trigger=true" >> $GITHUB_OUTPUT
          fi

      - name: Check available models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s https://models.github.ai/models \
          -H "Authorization: Bearer $GITHUB_TOKEN"

          curl -s https://models.github.ai/v1/models \
            -H "Authorization: Bearer $GITHUB_TOKEN"

          curl -s https://api.github.com/models \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json"


      - uses: actions/checkout@v4
        if: steps.check.outputs.trigger == 'true'

      - name: Setup git
        run: |
          git config user.name "claude-agent"
          git config user.email "ai@agent.com"

      - name: Generate fix via Claude (GitHub Models)
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          PROMPT="You are an autonomous coding agent.

          Read repository files.

          Fix the bug described below.

          Modify code directly.

          Issue:
          $ISSUE_TITLE

          $ISSUE_BODY
          "

          BODY=$(jq -n --arg content "$PROMPT" '{
            model:"openai/gpt-5",
            messages:[{role:"user",content:$content}]
          }')

          RESPONSE=$(echo "$BODY" | curl -s \
            https://models.github.ai/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d @-)

          echo "RESPONSE:$RESPONSE"

          RESULT=$(echo "$RESPONSE" | jq -r '
            .choices[0].message.content
            | if type=="string" then .
              else (.[]? | select(.type=="output_text") | .text)
              end
          ')

          echo "$RESULT" > ai-output.txt

      - name: Apply changes
        run: |
          git checkout -b claude-fix-${{ github.run_id }}

          # example: let AI output shell commands
          bash ai-output.txt || true

      - name: Commit and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add .
          git commit -m "Claude GitHub Models auto fix" || echo "No changes"
          git push origin HEAD

          gh pr create \
            --title "Claude auto fix" \
            --body "Generated via GitHub Models Claude"
