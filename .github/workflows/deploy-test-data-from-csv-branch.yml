name: Deploy Test Data to OSS (CSV update branches)

on:
  push:
    branches:
      - "chore/update-from-csv-issue*"
  workflow_dispatch:

jobs:
  deploy-test-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.9.0"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build builder-maps.json
        run: npm run build:maps

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OSSUtil
        run: |
          pip install oss2
          wget http://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64
          chmod 755 ossutil64

      - name: Configure OSSUtil
        run: |
          ./ossutil64 config -e oss-ap-southeast-1.aliyuncs.com -i ${{ secrets.ALI_ACCESS_KEY_ID }} -k ${{ secrets.ALI_ACCESS_KEY_SECRET }}

      - name: Upload public assets to prod OSS
        run: |
          ./ossutil64 cp -r public/imgs/ "${{ vars.ALI_MICRO_FE_OFFICIAL_BUCKET_OSS_URL}}/public/buildermaps/imgs/" --meta="Cache-Control:max-age=31536000" --update             

      - name: Upload test data to OSS (public/buildermaps/test/data)
        run: |
          ./ossutil64 cp -r public/data/ "${{ vars.ALI_MICRO_FE_OFFICIAL_BUCKET_OSS_URL}}/public/buildermaps/test/data/" --meta="Cache-Control:no-cache" --update
          ./ossutil64 cp public/data/builder-maps.json "${{ vars.ALI_MICRO_FE_OFFICIAL_BUCKET_OSS_URL}}/public/buildermaps/test/data/builder-maps.json" --meta="Cache-Control:no-cache" --update

